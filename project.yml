name: PomodoroBar
options:
  bundleIdPrefix: com.pomodorobar
  deploymentTarget:
    macOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.1.1"
    CURRENT_PROJECT_VERSION: "3"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

targets:
  PomodoroBar:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/PomodoroBar
      - path: Resources/Assets.xcassets
      # Point at the parent Resources/ directory so XcodeGen discovers the
      # *.lproj subdirectories and (a) adds each region to `knownRegions`
      # and (b) creates PBXVariantGroup entries for the .strings files in the
      # Resources build phase. Pointing directly at a single `de.lproj` only
      # registers a plain folder reference that never ships in the bundle,
      # which is why the German strings were missing from the Xcode build.
      - path: Resources
        excludes:
          - "Assets.xcassets"
          - "Info.plist"
          - "AppIcon.icns"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.archiet4.pomodorobar
        PRODUCT_NAME: PomodoroBar
        CODE_SIGN_ENTITLEMENTS: PomodoroBar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""